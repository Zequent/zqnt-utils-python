name: PR – Lint, Test, Build & Publish Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    name: Lint · Test · Build · Publish Preview
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── uv ────────────────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v2

      # ── Dependencies ───────────────────────────────────────────────────────
      - name: Install dependencies
        run: uv sync

      # ── Lint ───────────────────────────────────────────────────────────────
      - name: Lint (ruff)
        run: uv run ruff check .

      # ── Format Check ───────────────────────────────────────────────────────
      - name: Format check (ruff)
        run: uv run ruff format --check .

      # ── Version: read from pyproject.toml and add PR suffix ────────────────
      - name: Create pre-release version
        id: version
        run: |
          BASE_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "//' | sed 's/".*//')
          SHORT_SHA=$(git rev-parse --short HEAD)
          PR_VERSION="${BASE_VERSION}.post${{ github.event.pull_request.number }}.dev0"
          echo "version=${PR_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Pre-release version: ${PR_VERSION}"

      # ── Update version temporarily ─────────────────────────────────────────
      - name: Update version for pre-release
        run: |
          sed -i 's/version = ".*"/version = "${{ steps.version.outputs.version }}"/' pyproject.toml

      # ── Build wheel + sdist ────────────────────────────────────────────────
      - name: Build package
        run: uv build

      # ── Publish pre-release to GitHub Releases ─────────────────────────────
      - name: Create pre-release GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: true
          generate_release_notes: false
          files: dist/*

      # ── Comment PR with pre-release version ────────────────────────────────
      - name: Comment PR with pre-release version
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repo = context.repo;
            const version = "${{ steps.version.outputs.version }}";
            const releaseUrl = "${{ steps.release.outputs.url }}";
            const whlFile = `zqnt_utils-${version}-py3-none-any.whl`;
            const downloadUrl = `https://github.com/${repo.owner}/${repo.repo}/releases/download/v${version}/${whlFile}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: repo.owner,
              repo: repo.repo,
              body: `📦 Pre-release **v${version}** published: [Release](${releaseUrl})\n\nInstall with:\n\`\`\`bash\nuv add "zqnt-utils @ ${downloadUrl}"\n\`\`\``
            })
